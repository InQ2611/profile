<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0d1117;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.box{
    max-width:500px;
}

h1{
    font-size:40px;
    color:#58a6ff;
}

p{
    margin-top:15px;
    color:#c9d1d9;
    line-height:1.6;
}

.loader{
    width:60px;
    height:60px;
    border:6px solid #30363d;
    border-top:6px solid #58a6ff;
    border-radius:50%;
    margin:30px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}
</style>

</head>
<body>

<div class="box">
    <h1>🚧 Website Sedang Maintenance</h1>

    <div class="loader"></div>

    <p>
        Maaf, website sedang dalam proses pembaruan.<br>
        Silakan kembali beberapa saat lagi.
    </p>
</div>

</body>
</html>
