<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INQ Owner - System Access</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* CSS RESET & BASE VARIABLES */
:root {
  --neon-green: #0f0;
  --dark-bg: #050505;
  --game-red: #ff003c; /* Warna aksen untuk elemen game */
}

body {
  margin: 0;
  font-family: 'Share Tech Mono', monospace;
  background: var(--dark-bg);
  color: var(--neon-green);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
}

/* BACKGROUND MATRIX CANVAS */
#matrix-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* LOADING SCREEN */
#loader {
  position: fixed;
  inset: 0;
  background: var(--dark-bg);
  z-index: 999;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: opacity 0.5s ease;
}

.loader-text {
  font-size: 24px;
  margin-bottom: 20px;
  text-shadow: 0 0 10px var(--neon-green);
  animation: blink 1s infinite alternate;
}

@keyframes blink {
  0% { opacity: 1; }
  100% { opacity: 0.3; }
}

#enter-btn {
  padding: 12px 24px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 16px;
  color: var(--neon-green);
  background: transparent;
  border: 1px solid var(--neon-green);
  box-shadow: 0 0 10px var(--neon-green) inset;
  cursor: pointer;
  transition: all 0.3s ease;
}

#enter-btn:hover {
  background: var(--neon-green);
  color: var(--dark-bg);
  box-shadow: 0 0 20px var(--neon-green);
}

/* CARD PROFILE */
.card {
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  border: 1px solid var(--neon-green);
  box-shadow: 0 0 20px var(--neon-green), inset 0 0 15px rgba(0, 255, 0, 0.1);
  max-width: 380px;
  width: 90%;
  opacity: 0; 
  transform: translateY(30px);
  transition: opacity 1s ease, transform 1s ease;
  margin: 20px 0;
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

.card img.profile-pic {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 2px solid var(--neon-green);
  box-shadow: 0 0 15px var(--neon-green);
  margin-bottom: 10px;
  object-fit: cover;
}

h1 {
  margin: 10px 0;
  font-size: 22px;
  text-shadow: 0 0 10px var(--neon-green);
  letter-spacing: 2px;
}

/* GAME SECTION */
.game-box {
  background: rgba(0, 255, 0, 0.05);
  border: 1px dashed var(--neon-green);
  border-radius: 10px;
  padding: 15px;
  margin: 15px 0;
  text-align: left;
}

.game-title {
  font-size: 12px;
  color: var(--dark-bg);
  background: var(--neon-green);
  padding: 2px 8px;
  display: inline-block;
  margin-bottom: 10px;
  font-weight: bold;
}

.game-stats {
  font-size: 13px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid rgba(0, 255, 0, 0.1);
}

.links { margin-top: 15px; }

.btn {
  display: block;
  text-decoration: none;
  margin: 8px 0;
  padding: 10px;
  border-radius: 5px;
  border: 1px solid var(--neon-green);
  color: var(--neon-green);
  font-size: 13px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: var(--neon-green);
  color: var(--dark-bg);
  box-shadow: 0 0 15px var(--neon-green);
}

.spotify-box {
  margin-top: 15px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #1DB954;
}
</style>
</head>

<body>

<audio id="bg-music" loop>
  <source src="https://files.catbox.moe/9869v0.mp3" type="audio/mpeg">
</audio>

<canvas id="matrix-canvas"></canvas>

<div id="loader">
  <div class="loader-text">CONNECTING TO SERVER...</div>
  <button id="enter-btn">ACCESS SYSTEM</button>
</div>

<div class="card" id="profile-card">
  <img src="https://files.catbox.moe/typ1x7.jpg" alt="Owner" class="profile-pic">

  <h1>INQ OWNER</h1>

  <div class="game-box">
    <div class="game-title">PLAYER IDENTIFICATION: FF</div>
    <div class="game-stats">
        <div class="stat-row"><span>NICKNAME</span> <span style="color:#fff">NF` Linn</span></div>
        <div class="stat-row"><span>USER ID</span> <span style="color:#fff">4380079874</span></div>
        <div class="stat-row"><span>RANK</span> <span style="color:var(--neon-green)">adalah pokoknya 👑</span></div>
        <div class="stat-row"><span>ROLE</span> <span style="color:#fff">RUSHER / CODER</span></div>
    </div>
  </div>

  <p style="font-size: 12px;">
    > FULLSTACK DEVELOPER<br>
    > CREATOR OF Iin<br>
  </p>

  <div class="links">
    <a href="https://wa.me/6283182014581" class="btn">> WHATSAPP OWNER</a>
    <a href="https://whatsapp.com/channel/0029Vb6hwWfHbFUxwg3m530c" class="btn">> OFFICIAL CHANNEL</a>
  </div>

  <div class="spotify-box">
    <iframe style="border-radius:12px" 
    src="https://open.spotify.com/embed/track/466S89Y6pAL7X8Iu77T6S8?utm_source=generator&theme=0" 
    width="100%" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
  </div>

</div>

<script>
  // --- MATRIX RAIN LOGIC ---
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const chars = '01'.split('');
  const fontSize = 15;
  const columns = canvas.width / fontSize;
  const drops = Array(Math.floor(columns)).fill(1);

  function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0F0';
    ctx.font = fontSize + 'px monospace';
    drops.forEach((y, i) => {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * fontSize, y * fontSize);
      if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }
  setInterval(drawMatrix, 40);

  // --- LOADER LOGIC ---
  const enterBtn = document.getElementById('enter-btn');
  const loader = document.getElementById('loader');
  const card = document.getElementById('profile-card');
  const bgMusic = document.getElementById('bg-music');

  enterBtn.addEventListener('click', () => {
    bgMusic.play();
    loader.style.opacity = '0';
    setTimeout(() => {
      loader.style.display = 'none';
      card.classList.add('show');
    }, 500);
  });
</script>

</body>
